<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>VertexSwap Pro</title>
    <style>
        /* ===== RESET & BASE ===== */
        * { margin:0; padding:0; box-sizing:border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background:#0b0e14; color:#e8edf5; min-height:100vh; display:flex; flex-direction:column; }

        /* ===== AUTH PAGES ===== */
        .auth-page {
            display:flex; align-items:center; justify-content:center; min-height:100vh;
            background: radial-gradient(ellipse at center, #141b26 0%, #0b0e14 70%);
            padding:20px;
        }
        .auth-card {
            background:#151e2a; border-radius:18px; padding:40px 36px; width:100%; max-width:420px;
            box-shadow:0 20px 60px rgba(0,0,0,0.6); border:1px solid #253040;
        }
        .auth-card h1 { font-size:26px; margin-bottom:4px; background:linear-gradient(135deg,#00c9ff,#92fe9d); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .auth-card p.sub { color:#7a8ba3; margin-bottom:28px; font-size:14px; }
        .auth-card label { display:block; font-size:13px; color:#9aabc1; margin-bottom:5px; }
        .auth-card input { width:100%; padding:12px 14px; background:#0f1620; border:1px solid #253040; border-radius:10px; color:#fff; font-size:14px; margin-bottom:16px; transition:.2s; }
        .auth-card input:focus { outline:none; border-color:#00c9ff; box-shadow:0 0 0 3px rgba(0,201,255,0.15); }
        .auth-card button { width:100%; padding:13px; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; background:linear-gradient(135deg,#00c9ff,#92fe9d); color:#0b0e14; transition:.3s; }
        .auth-card button:hover { transform:translateY(-1px); box-shadow:0 8px 25px rgba(0,201,255,0.3); }
        .auth-card .alt-link { text-align:center; margin-top:18px; font-size:13px; color:#7a8ba3; }
        .auth-card .alt-link a { color:#00c9ff; text-decoration:none; cursor:pointer; }
        .auth-card .alt-link a:hover { text-decoration:underline; }
        .auth-error { background:#2d1414; color:#ff6b6b; padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; display:none; border:1px solid #4a1c1c; }

        /* ===== MAIN APP LAYOUT ===== */
        .app-container { display:none; flex-direction:column; min-height:100vh; }
        .app-container.active { display:flex; }

        /* top bar */
        .topbar {
            background:#111924; padding:14px 24px; display:flex; align-items:center; justify-content:space-between;
            border-bottom:1px solid #1f2b3a; position:sticky; top:0; z-index:100;
        }
        .topbar .logo { font-size:20px; font-weight:700; background:linear-gradient(135deg,#00c9ff,#92fe9d); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .topbar .user-info { display:flex; align-items:center; gap:14px; }
        .topbar .user-info span { color:#9aabc1; font-size:13px; }
        .topbar .user-info .bal { color:#92fe9d; font-weight:600; }
        .topbar .logout-btn { background:#253040; border:none; color:#e8edf5; padding:7px 16px; border-radius:8px; cursor:pointer; font-size:13px; transition:.2s; }
        .topbar .logout-btn:hover { background:#314257; }

        /* announcement banner */
        .announcement {
            background:#1a2533; margin:16px 24px 0; padding:12px 18px; border-radius:10px;
            border-left:4px solid #ffc107; font-size:13px; color:#ffd966; display:none;
        }
        .announcement.show { display:block; }

        /* main content */
        .main { flex:1; padding:20px 24px 80px; max-width:1100px; width:100%; margin:0 auto; }

        /* section heading */
        .section-title { font-size:18px; font-weight:600; margin:28px 0 14px; color:#c8d6e5; display:flex; align-items:center; gap:8px; }
        .section-title:first-of-type { margin-top:8px; }
        .section-title small { font-weight:400; font-size:12px; color:#7a8ba3; }

        /* feature grid */
        .feature-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:14px; }
        .feature-card {
            background:#151e2a; border:1px solid #1f2b3a; border-radius:14px; padding:18px 12px 14px;
            text-align:center; cursor:pointer; transition:.25s; position:relative;
        }
        .feature-card:hover { border-color:#3a5068; transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.3); }
        .feature-card.locked { opacity:0.55; cursor:not-allowed; }
        .feature-card.locked:hover { transform:none; border-color:#1f2b3a; box-shadow:none; }
        .feature-card .icon-wrap { height:44px; display:flex; align-items:center; justify-content:center; margin-bottom:8px; }
        .feature-card .icon-wrap svg { width:36px; height:36px; fill:#92fe9d; }
        .feature-card .fname { font-size:13px; font-weight:500; color:#e8edf5; }
        .feature-card .fdep { font-size:11px; color:#7a8ba3; margin-top:4px; }
        .feature-card .lock-badge { position:absolute; top:8px; right:10px; font-size:12px; color:#ff6b6b; }

        /* ===== DEPOSIT / MODAL ===== */
        .modal-overlay {
            display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:999;
            align-items:center; justify-content:center; padding:20px;
        }
        .modal-overlay.show { display:flex; }
        .modal {
            background:#151e2a; border-radius:16px; width:100%; max-width:460px; padding:30px 28px;
            border:1px solid #253040; box-shadow:0 25px 70px rgba(0,0,0,0.7);
            max-height:90vh; overflow-y:auto;
        }
        .modal h2 { font-size:20px; margin-bottom:4px; }
        .modal p.sub2 { color:#7a8ba3; font-size:13px; margin-bottom:18px; }
        .modal label { display:block; font-size:13px; color:#9aabc1; margin-bottom:5px; margin-top:14px; }
        .modal input, .modal select, .modal textarea {
            width:100%; padding:11px 14px; background:#0f1620; border:1px solid #253040; border-radius:10px;
            color:#fff; font-size:14px; margin-bottom:6px; transition:.2s;
        }
        .modal select { appearance:auto; }
        .modal input:focus, .modal select:focus { outline:none; border-color:#00c9ff; }
        .modal .btn-primary {
            width:100%; padding:13px; border:none; border-radius:10px; font-size:15px; font-weight:600;
            cursor:pointer; background:linear-gradient(135deg,#00c9ff,#92fe9d); color:#0b0e14; margin-top:18px; transition:.3s;
        }
        .modal .btn-primary:hover { box-shadow:0 8px 25px rgba(0,201,255,0.3); }
        .modal .btn-danger { background:#2d1414; color:#ff6b6b; border:1px solid #4a1c1c; }
        .modal .btn-danger:hover { background:#3f1c1c; }
        .modal .btn-secondary { background:#253040; color:#e8edf5; border:1px solid #314257; }
        .modal .btn-secondary:hover { background:#314257; }
        .modal .close-btn { float:right; background:none; border:none; color:#7a8ba3; font-size:22px; cursor:pointer; }
        .modal .deposit-address { background:#0f1620; padding:12px; border-radius:8px; text-align:center; font-size:13px; color:#92fe9d; word-break:break-all; margin:10px 0; }
        .modal .payment-methods { display:flex; gap:10px; margin:10px 0; }
        .modal .payment-methods button {
            flex:1; padding:10px; border:1px solid #253040; border-radius:8px; background:#0f1620; color:#e8edf5; cursor:pointer; font-size:13px; transition:.2s;
        }
        .modal .payment-methods button.active { border-color:#00c9ff; background:#1a2a3a; }
        .modal .qr-placeholder { width:150px; height:150px; background:#0f1620; border-radius:10px; margin:12px auto; display:flex; align-items:center; justify-content:center; color:#7a8ba3; font-size:12px; border:1px dashed #253040; }

        /* admin table */
        .admin-table { width:100%; border-collapse:collapse; margin-top:12px; font-size:13px; }
        .admin-table th { text-align:left; padding:10px 8px; color:#7a8ba3; border-bottom:1px solid #1f2b3a; font-weight:500; }
        .admin-table td { padding:10px 8px; border-bottom:1px solid #19222f; }
        .admin-table .btn-sm { padding:5px 12px; border:none; border-radius:6px; cursor:pointer; font-size:12px; }
        .admin-table .btn-sm.green { background:#1a3a2a; color:#92fe9d; }
        .admin-table .btn-sm.red { background:#3a1a1a; color:#ff6b6b; }
        .admin-table .btn-sm.blue { background:#1a2a3a; color:#66b0ff; }

        .tabs { display:flex; gap:4px; margin-bottom:16px; background:#0f1620; border-radius:10px; padding:4px; }
        .tabs button { flex:1; padding:9px; background:transparent; border:none; color:#7a8ba3; cursor:pointer; border-radius:8px; font-size:13px; transition:.2s; }
        .tabs button.active { background:#253040; color:#e8edf5; }

        .toast { position:fixed; bottom:30px; right:30px; background:#1a2a3a; border:1px solid #253040; border-radius:10px; padding:14px 20px; color:#e8edf5; font-size:13px; z-index:2000; display:none; box-shadow:0 10px 40px rgba(0,0,0,0.5); }
        .toast.show { display:block; animation:slideIn .3s ease; }
        @keyframes slideIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

        .hidden { display:none !important; }
        .flex-between { display:flex; justify-content:space-between; align-items:center; }

        /* ===== DEPOSIT HISTORY ===== */
        .deposit-item { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #19222f; font-size:13px; }
        .deposit-item .status { padding:3px 10px; border-radius:20px; font-size:11px; }
        .status.pending { background:#2a2a1a; color:#ffc107; }
        .status.approved { background:#1a3a2a; color:#92fe9d; }
        .status.rejected { background:#3a1a1a; color:#ff6b6b; }

        @media (max-width:600px) {
            .feature-grid { grid-template-columns:repeat(2,1fr); }
            .topbar { padding:12px 14px; flex-wrap:wrap; gap:8px; }
            .main { padding:14px 14px 60px; }
            .modal { padding:20px 16px; }
        }
    </style>
</head>
<body>

<!-- ===== LOGIN PAGE ===== -->
<div id="loginPage" class="auth-page">
    <div class="auth-card">
        <h1>VertexSwap</h1>
        <p class="sub">Sign in to your account</p>
        <div id="loginError" class="auth-error"></div>
        <label>Username</label>
        <input type="text" id="loginUser" placeholder="Enter username" />
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="Enter password" />
        <button onclick="handleLogin()">Sign In</button>
        <div class="alt-link">Don't have an account? <a onclick="showRegister()">Register</a></div>
    </div>
</div>

<!-- ===== REGISTER PAGE ===== -->
<div id="registerPage" class="auth-page" style="display:none;">
    <div class="auth-card">
        <h1>Create Account</h1>
        <p class="sub">Join VertexSwap today</p>
        <div id="regError" class="auth-error"></div>
        <label>Username</label>
        <input type="text" id="regUser" placeholder="Choose a username" />
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="your@email.com" />
        <label>Password</label>
        <input type="password" id="regPass" placeholder="Create password" />
        <button onclick="handleRegister()">Register</button>
        <div class="alt-link">Already registered? <a onclick="showLogin()">Sign in</a></div>
    </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="appContainer" class="app-container">
    <!-- Top Bar -->
    <div class="topbar">
        <div class="logo">VertexSwap</div>
        <div class="user-info">
            <span id="displayUser">user</span>
            <span>| Balance: <span class="bal" id="displayBal">$0.00</span></span>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
    </div>

    <!-- Announcement -->
    <div id="announcementBar" class="announcement"></div>

    <!-- Main Content -->
    <div class="main">

        <!-- Video Calls Section -->
        <div class="section-title">📹 Video Calls <small>face-swap calls</small></div>
        <div class="feature-grid" id="gridVideo"></div>

        <!-- Spoofing Section -->
        <div class="section-title">🕵️ Spoofing <small>anonymous tools</small></div>
        <div class="feature-grid" id="gridSpoof"></div>

        <!-- Services Section -->
        <div class="section-title">🏢 Services <small>premium services</small></div>
        <div class="feature-grid" id="gridServices"></div>

    </div>
</div>

<!-- ===== MODAL OVERLAY ===== -->
<div id="modalOverlay" class="modal-overlay">
    <div class="modal" id="modalContent"></div>
</div>

<!-- ===== TOAST ===== -->
<div id="toast" class="toast"></div>

<script>
// ============================================================
//  DATA LAYER — all persisted to localStorage
// ============================================================

const DB = {
    // ---------- users ----------
    getUsers() {
        return JSON.parse(localStorage.getItem('vs_users') || '[]');
    },
    saveUsers(users) {
        localStorage.setItem('vs_users', JSON.stringify(users));
    },
    findUser(username) {
        return this.getUsers().find(u => u.username === username);
    },
    // ---------- deposits ----------
    getDeposits() {
        return JSON.parse(localStorage.getItem('vs_deposits') || '[]');
    },
    saveDeposits(deps) {
        localStorage.setItem('vs_deposits', JSON.stringify(deps));
    },
    // ---------- settings ----------
    getSettings() {
        return JSON.parse(localStorage.getItem('vs_settings') || '{"minDeposit":50,"announcement":"","btcWallet":"bc1qxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx","usdtWallet":"TRXxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"}');
    },
    saveSettings(s) {
        localStorage.setItem('vs_settings', JSON.stringify(s));
    },
    // ---------- current user ----------
    getCurrent() {
        return localStorage.getItem('vs_current') || null;
    },
    setCurrent(u) {
        if (u) localStorage.setItem('vs_current', u);
        else localStorage.removeItem('vs_current');
    }
};

// ============================================================
//  AUTH
// ============================================================

function showRegister() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('registerPage').style.display = 'flex';
}
function showLogin() {
    document.getElementById('registerPage').style.display = 'none';
    document.getElementById('loginPage').style.display = 'flex';
}

function handleLogin() {
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value.trim();
    const errDiv = document.getElementById('loginError');
    errDiv.style.display = 'none';

    if (!user || !pass) { errDiv.textContent = 'Fill all fields.'; errDiv.style.display = 'block'; return; }

    const u = DB.findUser(user);
    if (!u || u.password !== pass) { errDiv.textContent = 'Invalid credentials.'; errDiv.style.display = 'block'; return; }
    if (u.status === 'blocked') { errDiv.textContent = 'Account blocked. Contact admin.'; errDiv.style.display = 'block'; return; }

    DB.setCurrent(user);
    renderApp();
}

function handleRegister() {
    const user = document.getElementById('regUser').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPass').value.trim();
    const errDiv = document.getElementById('regError');
    errDiv.style.display = 'none';

    if (!user || !email || !pass) { errDiv.textContent = 'Fill all fields.'; errDiv.style.display = 'block'; return; }
    if (DB.findUser(user)) { errDiv.textContent = 'Username taken.'; errDiv.style.display = 'block'; return; }

    const users = DB.getUsers();
    users.push({ username:user, email, password:pass, balance:0, status:'active' });
    DB.saveUsers(users);
    DB.setCurrent(user);
    renderApp();
}

function handleLogout() {
    DB.setCurrent(null);
    document.getElementById('appContainer').classList.remove('active');
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
}

// ============================================================
//  RENDER APP
// ============================================================

function renderApp() {
    const curr = DB.getCurrent();
    if (!curr) { location.reload(); return; }
    const user = DB.findUser(curr);
    if (!user) { handleLogout(); return; }

    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('registerPage').style.display = 'none';
    document.getElementById('appContainer').classList.add('active');

    document.getElementById('displayUser').textContent = user.username;
    document.getElementById('displayBal').textContent = '$' + user.balance.toFixed(2);

    // announcement
    const settings = DB.getSettings();
    const annEl = document.getElementById('announcementBar');
    if (settings.announcement && settings.announcement.trim()) {
        annEl.textContent = '📢 ' + settings.announcement;
        annEl.classList.add('show');
    } else {
        annEl.classList.remove('show');
    }

    renderFeatures(user);
}

function renderFeatures(user) {
    const grids = { video:'gridVideo', spoof:'gridSpoof', service:'gridServices' };
    const catLabels = { video:'📹 Video Calls', spoof:'🕵️ Spoofing', service:'🏢 Services' };

    for (const [cat, gridId] of Object.entries(grids)) {
        const el = document.getElementById(gridId);
        el.innerHTML = '';
        FEATURES.filter(f => f.cat === cat).forEach(f => {
            const canAccess = user.balance >= f.deposit;
            const card = document.createElement('div');
            card.className = 'feature-card' + (canAccess ? '' : ' locked');
            card.innerHTML = `
                <div class="icon-wrap">${ICONS[f.icon] || ''}</div>
                <div class="fname">${f.name}</div>
                <div class="fdep">Requires $${f.deposit}</div>
                ${!canAccess ? '<div class="lock-badge">🔒</div>' : ''}
            `;
            card.addEventListener('click', () => handleFeatureClick(f, user, canAccess));
            el.appendChild(card);
        });
    }
}

// ============================================================
//  FEATURE CLICK
// ============================================================

function handleFeatureClick(feature, user, canAccess) {
    const modal = document.getElementById('modalContent');
    const overlay = document.getElementById('modalOverlay');

    if (!canAccess) {
        modal.innerHTML = `
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <h2>🔒 Access Required</h2>
            <p class="sub2">You need <strong>$${feature.deposit}</strong> to unlock ${feature.name}.</p>
            <p style="color:#7a8ba3;font-size:13px;margin:12px 0;">Your balance: <strong style="color:#92fe9d;">$${user.balance.toFixed(2)}</strong></p>
            <button class="btn-primary" onclick="closeModal();openDepositModal()">Deposit Now</button>
            <button class="btn-secondary" style="width:100%;margin-top:8px;" onclick="closeModal()">Cancel</button>
        `;
    } else {
        // Feature "works" but returns error
        modal.innerHTML = `
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div style="text-align:center;padding:20px 0;">
                <div style="font-size:50px;margin-bottom:12px;">⚠️</div>
                <h2>Service Unavailable</h2>
                <p class="sub2">We're experiencing heavy traffic. Please try again later.</p>
                <div style="background:#0f1620;border-radius:10px;padding:14px;margin:16px 0;font-size:13px;color:#ffc107;">
                    Error 503 — Server is currently at capacity.<br/>
                    <span style="color:#7a8ba3;font-size:11px;">Expected resolution within 2–4 hours.</span>
                </div>
                <button class="btn-primary" onclick="closeModal()">OK</button>
            </div>
        `;
    }
    overlay.classList.add('show');
}

// ============================================================
//  DEPOSIT MODAL
// ============================================================

function openDepositModal() {
    const overlay = document.getElementById('modalOverlay');
    const modal = document.getElementById('modalContent');
    const settings = DB.getSettings();

    modal.innerHTML = `
        <button class="close-btn" onclick="closeModal()">&times;</button>
        <h2>💰 Make a Deposit</h2>
        <p class="sub2">Minimum deposit: <strong>$${settings.minDeposit}</strong></p>

        <label>Select Asset</label>
        <select id="depositAsset">
            <option value="btc">Bitcoin (BTC)</option>
            <option value="usdt">USDT (TRC-20)</option>
        </select>

        <label>Amount (USD)</label>
        <input type="number" id="depositAmount" min="${settings.minDeposit}" step="0.01" placeholder="e.g. 100" />

        <div id="depositAddressBox" class="deposit-address">
            ${settings.btcWallet}
        </div>
        <p style="color:#7a8ba3;font-size:11px;text-align:center;">Send exact amount to the address above.<br/>Deposits are manually approved by admin.</p>

        <button class="btn-primary" onclick="submitDeposit()">Submit Deposit</button>
    `;
    overlay.classList.add('show');

    // update address on asset change
    document.getElementById('depositAsset').addEventListener('change', function() {
        const s = DB.getSettings();
        document.getElementById('depositAddressBox').textContent =
            this.value === 'btc' ? s.btcWallet : s.usdtWallet;
    });
}

function submitDeposit() {
    const asset = document.getElementById('depositAsset').value;
    const amount = parseFloat(document.getElementById('depositAmount').value);
    const settings = DB.getSettings();
    const curr = DB.getCurrent();
    if (!curr) return;

    if (!amount || amount < settings.minDeposit) {
        showToast('Minimum deposit is $' + settings.minDeposit);
        return;
    }

    const deps = DB.getDeposits();
    deps.push({
        id: Date.now(),
        username: curr,
        asset: asset === 'btc' ? 'BTC' : 'USDT (TRC-20)',
        amount: amount,
        status: 'pending',
        date: new Date().toISOString()
    });
    DB.saveDeposits(deps);

    showToast('Deposit submitted for approval. Wait for admin confirmation.');
    closeModal();
}

// ============================================================
//  MODAL HELPERS
// ============================================================

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
}

// close on backdrop click
document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
}

// ============================================================
//  ADMIN — accessible via URL hash #admin
// ============================================================

function openAdmin() {
    const overlay = document.getElementById('modalOverlay');
    const modal = document.getElementById('modalContent');
    const users = DB.getUsers();
    const deps = DB.getDeposits();
    const settings = DB.getSettings();

    let userRows = users.map(u => `
        <tr>
            <td>${u.username}</td>
            <td>$${u.balance.toFixed(2)}</td>
            <td>${u.status}</td>
            <td>
                <button class="btn-sm green" onclick="adminCredit('${u.username}')">Credit</button>
                <button class="btn-sm red" onclick="adminDeleteUser('${u.username}')">Delete</button>
                <button class="btn-sm blue" onclick="adminToggleStatus('${u.username}')">${u.status === 'active' ? 'Block' : 'Unblock'}</button>
            </td>
        </tr>
    `).join('');

    let depRows = deps.slice().reverse().map(d => `
        <div class="deposit-item">
            <span><strong>${d.username}</strong> — $${d.amount} (${d.asset})</span>
            <span>
                <span class="status ${d.status}">${d.status}</span>
                ${d.status === 'pending' ? `
                    <button class="btn-sm green" onclick="adminApproveDep(${d.id})">✓</button>
                    <button class="btn-sm red" onclick="adminRejectDep(${d.id})">✗</button>
                ` : ''}
            </span>
        </div>
    `).join('') || '<p style="color:#7a8ba3;font-size:13px;">No deposits yet.</p>';

    modal.innerHTML = `
        <button class="close-btn" onclick="closeModal()">&times;</button>
        <h2>⚙️ Admin Panel</h2>
        <p class="sub2">Manage users, deposits, and settings</p>

        <div class="tabs">
            <button class="active" onclick="adminTab(this,'users')">Users</button>
            <button onclick="adminTab(this,'deposits')">Deposits</button>
            <button onclick="adminTab(this,'settings')">Settings</button>
        </div>

        <!-- Users Tab -->
        <div id="adminUsers">
            <table class="admin-table">
                <thead><tr><th>User</th><th>Balance</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody>${userRows}</tbody>
            </table>
        </div>

        <!-- Deposits Tab -->
        <div id="adminDeposits" style="display:none;">
            <div style="background:#0f1620;border-radius:10px;padding:12px;">${depRows}</div>
        </div>

        <!-- Settings Tab -->
        <div id="adminSettings" style="display:none;">
            <label>Min Deposit ($)</label>
            <input type="number" id="admMinDep" value="${settings.minDeposit}" step="0.01" />

            <label>BTC Wallet Address</label>
            <input type="text" id="admBtc" value="${settings.btcWallet}" />

            <label>USDT (TRC-20) Wallet Address</label>
            <input type="text" id="admUsdt" value="${settings.usdtWallet}" />

            <label>Announcement</label>
            <textarea id="admAnn" rows="3" style="resize:vertical;">${settings.announcement || ''}</textarea>

            <button class="btn-primary" onclick="adminSaveSettings()">Save Settings</button>
        </div>
    `;
    overlay.classList.add('show');
}

function adminTab(btn, tab) {
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ['adminUsers','adminDeposits','adminSettings'].forEach(id => {
        document.getElementById(id).style.display = id === 'admin'+tab.charAt(0).toUpperCase()+tab.slice(1) ? 'block' : 'none';
    });
}

function adminCredit(username) {
    const amt = prompt('Credit amount ($):');
    if (!amt || isNaN(amt) || parseFloat(amt) <= 0) return;
    const users = DB.getUsers();
    const u = users.find(x => x.username === username);
    if (!u) return;
    u.balance += parseFloat(amt);
    DB.saveUsers(users);
    showToast(`Credited $${amt} to ${username}`);
    adminRefresh();
}

function adminDeleteUser(username) {
    if (!confirm(`Delete user "${username}"? This cannot be undone.`)) return;
    let users = DB.getUsers().filter(x => x.username !== username);
    DB.saveUsers(users);
    showToast(`Deleted ${username}`);
    adminRefresh();
}

function adminToggleStatus(username) {
    const users = DB.getUsers();
    const u = users.find(x => x.username === username);
    if (!u) return;
    u.status = u.status === 'active' ? 'blocked' : 'active';
    DB.saveUsers(users);
    showToast(`${username} is now ${u.status}`);
    adminRefresh();
}

function adminApproveDep(id) {
    const deps = DB.getDeposits();
    const dep = deps.find(d => d.id === id);
    if (!dep || dep.status !== 'pending') return;

    // credit user
    const users = DB.getUsers();
    const u = users.find(x => x.username === dep.username);
    if (u) u.balance += dep.amount;
    DB.saveUsers(users);

    dep.status = 'approved';
    DB.saveDeposits(deps);
    showToast(`Deposit $${dep.amount} approved for ${dep.username}`);
    adminRefresh();
}

function adminRejectDep(id) {
    const deps = DB.getDeposits();
    const dep = deps.find(d => d.id === id);
    if (!dep || dep.status !== 'pending') return;
    dep.status = 'rejected';
    DB.saveDeposits(deps);
    showToast(`Deposit rejected`);
    adminRefresh();
}

function adminSaveSettings() {
    const minDep = parseFloat(document.getElementById('admMinDep').value);
    const btc = document.getElementById('admBtc').value.trim();
    const usdt = document.getElementById('admUsdt').value.trim();
    const ann = document.getElementById('admAnn').value.trim();

    if (!minDep || minDep <= 0) { showToast('Invalid min deposit'); return; }
    if (!btc) { showToast('Enter BTC wallet'); return; }
    if (!usdt) { showToast('Enter USDT wallet'); return; }

    DB.saveSettings({ minDeposit:minDep, announcement:ann, btcWallet:btc, usdtWallet:usdt });
    showToast('Settings saved');
    closeModal();
    const curr = DB.getCurrent();
    if (curr) renderApp();
}

function adminRefresh() {
    closeModal();
    setTimeout(openAdmin, 100);
}

// ============================================================
//  ADMIN ACCESS — double-click on logo
// ============================================================

let logoClickCount = 0;
document.addEventListener('click', function(e) {
    if (e.target.classList.contains('logo') || (e.target.parentElement && e.target.parentElement.classList.contains('logo'))) {
        logoClickCount++;
        if (logoClickCount >= 5) {
            logoClickCount = 0;
            openAdmin();
        }
        setTimeout(() => { logoClickCount = 0; }, 2000);
    }
});
